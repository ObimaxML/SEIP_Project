

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: seip_postgres
    environment:
      POSTGRES_DB: seip_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Krbgp01@
    ports:
      - "5432:5432"
    volumes:
      - seip_pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  seip_pgdata:
